<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 KG Price Calculator</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #f8ffae, #43c6ac);
      color: #333;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    .container {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.15);
      max-width: 500px;
      width: 95%;
      margin: auto;
      padding: 25px 15px;
    }

    h1 {
      color: #00b894;
      font-size: 1.6em;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    button {
      background-color: #00b894;
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #019875;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #2d3436;
    }

    .instructions {
      background: #fff9c4;
      color: #444;
      border: 1px solid #ffeb3b;
      border-radius: 10px;
      text-align: left;
      padding: 15px;
      margin: 15px auto 20px;
      font-size: 14px;
      width: 90%;
    }

    .instructions ol {
      padding-left: 20px;
      margin: 0;
    }

    @media screen and (max-width: 400px) {
      h1 {
        font-size: 1.4em;
      }

      button {
        font-size: 15px;
        padding: 10px 20px;
      }

      .result {
        font-size: 16px;
      }

      .instructions {
        font-size: 13px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💰 KG Price Calculator</h1>

    <div class="instructions">
      <strong>📌 How to Use:</strong>
      <ol>
        <li>Enter the <b>price per KG</b> (e.g., 100 ₹).</li>
        <li>Enter the <b>KG</b> (e.g., 2).</li>
        <li>Enter the <b>grams</b> (e.g., 500 g, optional).</li>
        <li>Click <b>“Calculate Total”</b>.</li>
        <li>You’ll see the total price below.</li>
      </ol>
    </div>

    <input type="number" id="pricePerKg" placeholder="Enter price per KG (₹)">
    <input type="number" id="kg" placeholder="Enter KG">
    <input type="number" id="grams" placeholder="Enter grams (optional)">
    <button onclick="calculate()">Calculate Total</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calculate() {
      const pricePerKg = parseFloat(document.getElementById("pricePerKg").value);
      const kg = parseFloat(document.getElementById("kg").value) || 0;
      const grams = parseFloat(document.getElementById("grams").value) || 0;

      const totalKg = kg + (grams / 1000);
      const totalPrice = (totalKg * pricePerKg).toFixed(2);

      document.getElementById("result").innerHTML = 
        `📦 Total: ₹${totalPrice} for ${kg} kg ${grams} g`;
    }
  </script>
</body>
</html>
