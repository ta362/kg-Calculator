<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
    .container { background: #fff; max-width: 450px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    
    /* Scatter Text Styles */
    .scatter-text { display: inline-block; transition: all 1s ease; cursor: pointer; position: relative; }
    
    input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; }
    .result-box { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 10px; font-weight: bold; text-align: left; }
    span.val { color: #d63031; }
  </style>
</head>
<body>

<div class="container">
  <h1>Price Calculator</h1>
  
  <!-- টেক্সট যা ছড়িয়ে পড়বে -->
  <div id="textContainer" style="margin-bottom: 20px; font-size: 14px; font-weight: bold; background: #eef6ff; padding: 10px;">
    Hover over this text to scatter it: "How to use: Enter price, kg, and grams."
  </div>

  <input type="number" id="pricePerKg" placeholder="Price per KG" oninput="calculate()">
  <input type="number" id="qtyKg" placeholder="Total KG" oninput="calculate()">
  <input type="number" id="qtyGram" placeholder="Grams" oninput="calculate()">

  <div class="result-box">
    <div>Price for KGs: <span class="val" id="resKg">0</span></div>
    <div>Price for Grams: <span class="val" id="resGram">0</span></div>
    <div>Price per 1 Gram: <span class="val" id="resOneGram">0</span></div>
  </div>
</div>

<script>
  const container = document.getElementById('textContainer');
  const text = container.innerText;
  container.innerHTML = '';

  // প্রতিটি অক্ষরকে আলাদা span এ রূপান্তর
  text.split('').forEach(char => {
    const span = document.createElement('span');
    span.innerText = char;
    span.className = 'scatter-text';
    container.appendChild(span);
  });

  const letters = document.querySelectorAll('.scatter-text');

  container.addEventListener('mouseover', () => {
    letters.forEach(letter => {
      // প্রতিটি অক্ষরকে এলোমেলো দিকে পাঠানো
      const x = (Math.random() - 0.5) * 500;
      const y = (Math.random() - 0.5) * 500;
      letter.style.transform = `translate(${x}px, ${y}px) rotate(${Math.random() * 360}deg)`;
      letter.style.opacity = '0';
    });
  });

  container.addEventListener('mouseout', () => {
    letters.forEach(letter => {
      // আবার আগের জায়গায় ফিরে আসা
      letter.style.transform = `translate(0, 0) rotate(0deg)`;
      letter.style.opacity = '1';
    });
  });

  function calculate() {
    const p = parseFloat(document.getElementById('pricePerKg').value) || 0;
    const k = parseFloat(document.getElementById('qtyKg').value) || 0;
    const g = parseFloat(document.getElementById('qtyGram').value) || 0;
    document.getElementById('resKg').innerHTML = (p * k).toFixed(2);
    document.getElementById('resGram').innerHTML = ((p / 1000) * g).toFixed(2);
    document.getElementById('resOneGram').innerHTML = (p / 1000).toFixed(2);
  }
</script>

</body>
</html>
