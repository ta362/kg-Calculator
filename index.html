<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KG Price Calculator</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; padding: 20px; text-align: center; }
    .container { background: #fff; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    h1 { color: #00b894; font-size: 1.5em; }
    .box { border: 1px solid #ddd; padding: 15px; margin: 15px 0; border-radius: 10px; background: #f9f9f9; text-align: left; }
    input { width: 90%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; display: block; }
    button { background: #00b894; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 5px; }
    .result { font-weight: bold; color: #d63031; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <h1>KG Price Calculator</h1>

  <div class="box">
    <strong>1. Price for total KG</strong>
    <input type="number" id="priceKg" placeholder="Price per KG">
    <input type="number" id="qtyKg" placeholder="Total KG">
    <button onclick="calcTotal()">Calculate</button>
    <div class="result" id="resTotal"></div>
  </div>

  <div class="box">
    <strong>2. Price for X Grams</strong>
    <input type="number" id="priceKg2" placeholder="Price per KG">
    <input type="number" id="qtyGram" placeholder="Quantity in Grams">
    <button onclick="calcGram()">Calculate</button>
    <div class="result" id="resGram"></div>
  </div>

  <div class="box">
    <strong>3. Price per 1 Gram</strong>
    <input type="number" id="priceKg3" placeholder="Price per KG">
    <button onclick="calcOneGram()">Calculate</button>
    <div class="result" id="resOneGram"></div>
  </div>
</div>

<script>
  function calcTotal() {
    let price = document.getElementById('priceKg').value;
    let qty = document.getElementById('qtyKg').value;
    document.getElementById('resTotal').innerHTML = `Total Price: ${price * qty} units`;
  }

  function calcGram() {
    let price = document.getElementById('priceKg2').value;
    let gram = document.getElementById('qtyGram').value;
    let total = (price / 1000) * gram;
    document.getElementById('resGram').innerHTML = `Price for ${gram}g: ${total.toFixed(2)} units`;
  }

  function calcOneGram() {
    let price = document.getElementById('priceKg3').value;
    let oneGram = price / 1000;
    document.getElementById('resOneGram').innerHTML = `Price per 1g: ${oneGram.toFixed(2)} units`;
  }
</script>

</body>
</html>
