<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 Advanced KG Price Calculator</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; padding: 20px; text-align: center; }
    .container { background: #fff; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    h1 { color: #00b894; font-size: 1.5em; }
    .box { border: 1px solid #ddd; padding: 15px; margin: 15px 0; border-radius: 10px; background: #f9f9f9; text-align: left; }
    input { width: 90%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
    button { background: #00b894; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 5px; }
    .result { font-weight: bold; color: #d63031; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <h1>💰 KG Calculator</h1>

  <div class="box">
    <strong>১. মোট কত কেজির দাম কত?</strong>
    <input type="number" id="priceKg" placeholder="প্রতি কেজির দাম (টাকা)">
    <input type="number" id="qtyKg" placeholder="মোট কেজি">
    <button onclick="calcTotal()">দাম বের করুন</button>
    <div class="result" id="resTotal"></div>
  </div>

  <div class="box">
    <strong>২. কত গ্রামের দাম কত?</strong>
    <input type="number" id="priceKg2" placeholder="প্রতি কেজির দাম (টাকা)">
    <input type="number" id="qtyGram" placeholder="কত গ্রাম">
    <button onclick="calcGram()">দাম বের করুন</button>
    <div class="result" id="resGram"></div>
  </div>

  <div class="box">
    <strong>৩. ১ গ্রামের দাম কত?</strong>
    <input type="number" id="priceKg3" placeholder="প্রতি কেজির দাম (টাকা)">
    <button onclick="calcOneGram()">১ গ্রামের দাম দেখুন</button>
    <div class="result" id="resOneGram"></div>
  </div>
</div>

<script>
  function calcTotal() {
    let price = document.getElementById('priceKg').value;
    let qty = document.getElementById('qtyKg').value;
    document.getElementById('resTotal').innerHTML = `মোট দাম: ${price * qty} টাকা`;
  }

  function calcGram() {
    let price = document.getElementById('priceKg2').value;
    let gram = document.getElementById('qtyGram').value;
    let total = (price / 1000) * gram;
    document.getElementById('resGram').innerHTML = `${gram} গ্রামের দাম: ${total.toFixed(2)} টাকা`;
  }

  function calcOneGram() {
    let price = document.getElementById('priceKg3').value;
    let oneGram = price / 1000;
    document.getElementById('resOneGram').innerHTML = `১ গ্রামের দাম: ${oneGram.toFixed(2)} টাকা`;
  }
</script>

</body>
</html>
