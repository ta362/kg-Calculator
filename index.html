<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Calculator</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
    .container { background: #fff; max-width: 450px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    h1 { color: #00b894; font-size: 1.5em; }
    
    /* Instructions Styling */
    .usage-guide { 
      background: #eef6ff; 
      padding: 15px; 
      border-radius: 10px; 
      text-align: left; 
      font-size: 13px; 
      margin-bottom: 20px; 
      border-left: 5px solid #00b894;
    }
    
    input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; }
    .result-box { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 10px; font-weight: bold; text-align: left; }
    .result-text { margin: 8px 0; color: #333; }
    span { color: #d63031; }
  </style>
</head>
<body>

<div class="container">
  <h1>Price Calculator</h1>
  
  <!-- Instructions added directly into the UI -->
  <div class="usage-guide">
    <strong>How to use:</strong>
    <ol style="padding-left: 20px; margin: 5px 0;">
      <li>Enter the <b>Price per KG</b>.</li>
      <li>Enter the <b>Total KG</b> to see the price for that weight.</li>
      <li>Enter <b>Grams</b> to see the price for a specific amount.</li>
      <li>The calculator works <b>automatically</b> as you type!</li>
    </ol>
  </div>

  <input type="number" id="pricePerKg" placeholder="Price per KG (e.g. 1300)" oninput="calculate()">
  <input type="number" id="qtyKg" placeholder="Total KG" oninput="calculate()">
  <input type="number" id="qtyGram" placeholder="Grams" oninput="calculate()">

  <div class="result-box">
    <div class="result-text">Price for KGs: <span id="resKg">0</span></div>
    <div class="result-text">Price for Grams: <span id="resGram">0</span></div>
    <div class="result-text">Price per 1 Gram: <span id="resOneGram">0</span></div>
  </div>
</div>

<script>
  function calculate() {
    const price = parseFloat(document.getElementById('pricePerKg').value) || 0;
    const kg = parseFloat(document.getElementById('qtyKg').value) || 0;
    const gram = parseFloat(document.getElementById('qtyGram').value) || 0;

    // Calculate
    const totalKgPrice = price * kg;
    const totalGramPrice = (price / 1000) * gram;
    const perGramPrice = price / 1000;

    // Update Display
    document.getElementById('resKg').innerHTML = totalKgPrice.toFixed(2);
    document.getElementById('resGram').innerHTML = totalGramPrice.toFixed(2);
    document.getElementById('resOneGram').innerHTML = perGramPrice.toFixed(2);
  }
</script>

</body>
</html>
