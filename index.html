<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; text-align: center; overflow-x: hidden; }
    .container { background: #16213e; max-width: 450px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); position: relative; }
    h1 { color: #4ecca3; font-size: 1.6em; }
    
    #textContainer { 
      margin-bottom: 20px; text-align: left; background: #0f3460; padding: 15px; 
      border-radius: 10px; color: #ffffff; border: 1px solid #4ecca3;
      user-select: none; position: relative;
    }
    
    .scatter-text { 
      display: inline-block; 
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      cursor: crosshair;
      position: relative;
    }
    
    input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #4ecca3; border-radius: 8px; background: #1a1a2e; color: white; }
    .result-box { margin-top: 20px; padding: 15px; background: #0f3460; border-radius: 10px; font-weight: bold; text-align: left; color: #4ecca3; }
    span.val { color: #ff4757; }
  </style>
</head>
<body>

<div class="container">
  <h1>Price Calculator</h1>
  
  <div id="textContainer">
    <strong>How to use:</strong>
    <ol id="instructionList" style="padding-left: 20px; margin: 5px 0;">
      <li>Enter the Price per KG.</li>
      <li>Enter the Total KG.</li>
      <li>Enter Grams to see price.</li>
    </ol>
  </div>

  <input type="number" id="pricePerKg" placeholder="Price per KG" oninput="calculate()">
  <input type="number" id="qtyKg" placeholder="Total KG" oninput="calculate()">
  <input type="number" id="qtyGram" placeholder="Grams" oninput="calculate()">

  <div class="result-box">
    <div>Price for KGs: <span class="val" id="resKg">0</span></div>
    <div>Price for Grams: <span class="val" id="resGram">0</span></div>
    <div>Price per 1 Gram: <span class="val" id="resOneGram">0</span></div>
  </div>
</div>

<script>
  const container = document.getElementById('instructionList');
  
  function wrapChars(element) {
    element.childNodes.forEach(node => {
      if (node.nodeType === 3) {
        const text = node.nodeValue;
        const spanWrapper = document.createElement('span');
        text.split('').forEach(char => {
          const span = document.createElement('span');
          span.innerText = char;
          span.className = 'scatter-text';
          spanWrapper.appendChild(span);
        });
        node.replaceWith(spanWrapper);
      } else {
        wrapChars(node);
      }
    });
  }
  wrapChars(container);

  const letters = document.querySelectorAll('.scatter-text');

  const moveLetter = (e) => {
    const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
    const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
    
    letters.forEach(letter => {
      const rect = letter.getBoundingClientRect();
      const dist = Math.sqrt(Math.pow(clientX - (rect.left + rect.width/2), 2) + Math.pow(clientY - (rect.top + rect.height/2), 2));
      
      if (dist < 40) {
        // পুরো স্ক্রিন জুড়ে ছিটকে যাওয়ার জন্য হিসাব
        const randomX = (Math.random() - 0.5) * window.innerWidth;
        const randomY = (Math.random() - 0.5) * window.innerHeight;
        
        letter.style.position = 'fixed'; // যাতে পুরো স্ক্রিনে যেতে পারে
        letter.style.transform = `translate(${randomX}px, ${randomY}px) rotate(${Math.random() * 720}deg)`;
        
        setTimeout(() => {
          letter.style.position = 'static';
          letter.style.transform = `translate(0, 0) rotate(0deg)`;
        }, 1200);
      }
    });
  };

  window.addEventListener('mousemove', moveLetter);
  window.addEventListener('touchmove', moveLetter);

  function calculate() {
    const p = parseFloat(document.getElementById('pricePerKg').value) || 0;
    const k = parseFloat(document.getElementById('qtyKg').value) || 0;
    const g = parseFloat(document.getElementById('qtyGram').value) || 0;
    document.getElementById('resKg').innerHTML = (p * k).toFixed(2);
    document.getElementById('resGram').innerHTML = ((p / 1000) * g).toFixed(2);
    document.getElementById('resOneGram').innerHTML = (p / 1000).toFixed(2);
  }
</script>

</body>
</html>
