<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; text-align: center; margin: 0; min-height: 100vh; }
    .container { background: #16213e; max-width: 450px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; z-index: 10; }
    h1 { color: #4ecca3; margin-bottom: 25px; }

    /* Instructions Box */
    #textContainer { 
      margin-bottom: 30px; text-align: left; background: #0f3460; padding: 20px; 
      border-radius: 15px; color: #ffffff; border: 1px solid #4ecca3;
      position: relative; height: 120px; /* নির্দিষ্ট উচ্চতা যাতে অক্ষর উড়লেও বক্স না নড়ে */
    }

    /* অক্ষরগুলোর স্টাইল */
    .char { 
      position: absolute; 
      display: inline-block; 
      transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      cursor: crosshair;
      font-weight: bold;
    }

    /* Input Fields */
    .input-group { margin-bottom: 20px; }
    input { width: 90%; padding: 14px; margin: 10px 0; border: 1px solid #4ecca3; border-radius: 10px; background: #1a1a2e; color: white; outline: none; }
    .result-box { margin-top: 25px; padding: 20px; background: #0f3460; border-radius: 15px; text-align: left; color: #4ecca3; font-weight: bold; }
    span.val { color: #ff4757; }
  </style>
</head>
<body>

<div class="container">
  <h1>Price Calculator</h1>
  
  <div id="textContainer">
    <div id="instructionList">How to use: 1. Enter price per KG. 2. Enter total KG. 3. Enter grams to see price.</div>
  </div>

  <div class="input-group">
    <input type="number" id="pricePerKg" placeholder="Price per KG" oninput="calculate()">
    <input type="number" id="qtyKg" placeholder="Total KG" oninput="calculate()">
    <input type="number" id="qtyGram" placeholder="Grams" oninput="calculate()">
  </div>

  <div class="result-box">
    <div>Price for KGs: <span class="val" id="resKg">0</span></div>
    <div>Price for Grams: <span class="val" id="resGram">0</span></div>
    <div>Price per 1 Gram: <span class="val" id="resOneGram">0</span></div>
  </div>
</div>

<script>
  const container = document.getElementById('textContainer');
  const text = "How to use: 1. Enter price per KG. 2. Enter total KG. 3. Enter grams to see price.";
  
  // অক্ষরগুলো তৈরি করা
  text.split('').forEach((char, i) => {
    const span = document.createElement('span');
    span.innerText = char;
    span.className = 'char';
    // অক্ষরের প্রাথমিক পজিশন সেট করা (বক্সের ভেতর)
    span.style.left = (20 + (i * 12)) + 'px'; 
    span.style.top = '20px';
    container.appendChild(span);
  });

  const chars = document.querySelectorAll('.char');

  // টাচ বা মাউস মুভ করলে অক্ষর উড়ানো
  const scatter = (e) => {
    const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
    const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);

    chars.forEach(char => {
      const rect = char.getBoundingClientRect();
      const dist = Math.sqrt(Math.pow(x - rect.left, 2) + Math.pow(y - rect.top, 2));

      if (dist < 40) {
        char.style.transform = `translate(${(Math.random()-0.5)*800}px, ${(Math.random()-0.5)*800}px) rotate(${Math.random()*360}deg)`;
        setTimeout(() => {
          char.style.transform = `translate(0, 0) rotate(0deg)`;
        }, 1500);
      }
    });
  };

  window.addEventListener('mousemove', scatter);
  window.addEventListener('touchmove', scatter);

  function calculate() {
    const p = parseFloat(document.getElementById('pricePerKg').value) || 0;
    const k = parseFloat(document.getElementById('qtyKg').value) || 0;
    const g = parseFloat(document.getElementById('qtyGram').value) || 0;
    document.getElementById('resKg').innerHTML = (p * k).toFixed(2);
    document.getElementById('resGram').innerHTML = ((p / 1000) * g).toFixed(2);
    document.getElementById('resOneGram').innerHTML = (p / 1000).toFixed(2);
  }
</script>

</body>
</html>
