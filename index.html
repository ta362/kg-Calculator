<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; text-align: center; margin: 0; min-height: 100vh; }
    .container { background: #16213e; max-width: 600px; margin: auto; padding: 40px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
    h1 { color: #4ecca3; font-size: 2.2em; margin-bottom: 30px; }

    #textContainer { 
      margin-bottom: 40px; text-align: left; background: #0f3460; padding: 25px; 
      border-radius: 20px; color: #ffffff; border: 2px solid #4ecca3;
      min-height: 120px; font-size: 1.3em; line-height: 2;
    }

    /* অক্ষরগুলোর অটোমেটিক হালকা ঝিরঝির */
    .char { 
      display: inline-block; 
      cursor: pointer;
      font-weight: bold;
      padding: 0 1px;
      user-select: none;
      animation: auto-vibrate 3s ease-in-out infinite;
    }

    @keyframes auto-vibrate {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(0.5px, -0.5px); }
    }

    /* মাউস লাগলে শক্তিশালী ঝিরঝির */
    .intense-shimmer {
      animation: intense-vibrate 0.2s linear infinite !important;
    }

    @keyframes intense-vibrate {
      0% { transform: translate(3px, 3px) rotate(0deg) scale(1.2); }
      25% { transform: translate(-3px, -3px) rotate(-10deg) scale(1.2); }
      50% { transform: translate(3px, -3px) rotate(10deg) scale(1.2); }
      75% { transform: translate(-3px, 3px) rotate(-10deg) scale(1.2); }
      100% { transform: translate(3px, 3px) rotate(0deg) scale(1.2); }
    }

    input { width: 95%; padding: 20px; margin: 15px 0; border: 2px solid #4ecca3; border-radius: 15px; background: #1a1a2e; color: white; outline: none; font-size: 1.2em; }
    .result-box { margin-top: 30px; padding: 25px; background: #0f3460; border-radius: 20px; text-align: left; color: #4ecca3; font-size: 1.3em; font-weight: bold; }
    span.val { color: #ff4757; }
  </style>
</head>
<body>

<div class="container">
  <h1>Price Calculator</h1>
  
  <div id="textContainer">
    <div id="instructionList">How to use: 1. Enter price per KG. 2. Enter total KG. 3. Enter grams to see price.</div>
  </div>

  <input type="number" id="pricePerKg" placeholder="Price per KG" oninput="calculate()">
  <input type="number" id="qtyKg" placeholder="Total KG" oninput="calculate()">
  <input type="number" id="qtyGram" placeholder="Grams" oninput="calculate()">

  <div class="result-box">
    <div>Price for KGs: <span class="val" id="resKg">0</span></div>
    <div>Price for Grams: <span class="val" id="resGram">0</span></div>
    <div>Price per 1 Gram: <span class="val" id="resOneGram">0</span></div>
  </div>
</div>

<script>
  const instructionList = document.getElementById('instructionList');
  const text = instructionList.innerText;
  instructionList.innerHTML = '';

  text.split('').forEach(char => {
    const span = document.createElement('span');
    span.innerText = char === ' ' ? '\u00A0' : char;
    span.className = 'char';
    instructionList.appendChild(span);
  });

  document.querySelectorAll('.char').forEach(char => {
    // মাউস টাচ করলে তীব্রতা বেড়ে যাবে
    char.addEventListener('mouseenter', () => {
      char.classList.add('intense-shimmer');
      // ১ সেকেন্ড পর আবার অটোমেটিক মোডে ফিরে যাবে
      setTimeout(() => {
        char.classList.remove('intense-shimmer');
      }, 1000);
    });
  });

  function calculate() {
    const p = parseFloat(document.getElementById('pricePerKg').value) || 0;
    const k = parseFloat(document.getElementById('qtyKg').value) || 0;
    const g = parseFloat(document.getElementById('qtyGram').value) || 0;
    document.getElementById('resKg').innerHTML = (p * k).toFixed(2);
    document.getElementById('resGram').innerHTML = ((p / 1000) * g).toFixed(2);
    document.getElementById('resOneGram').innerHTML = (p / 1000).toFixed(2);
  }
</script>

</body>
</html>
