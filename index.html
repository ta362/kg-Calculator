<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; overflow-x: hidden; }
    .container { background: #fff; max-width: 450px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.1); position: relative; }
    
    /* বড় লিস্ট এবং টেক্সট স্টাইল */
    #textContainer { 
      margin-bottom: 20px; 
      text-align: left; 
      font-weight: bold; 
      background: #eef6ff; 
      padding: 15px; 
      border-radius: 10px;
    }
    
    .scatter-text { 
      display: inline-block; 
      transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      cursor: pointer; 
      position: relative;
    }
    
    input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; }
    .result-box { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 10px; font-weight: bold; text-align: left; }
    span.val { color: #d63031; }
  </style>
</head>
<body>

<div class="container">
  <h1>Price Calculator</h1>
  
  <div id="textContainer">
    <strong>How to use:</strong>
    <ol id="instructionList" style="padding-left: 20px;">
      <li>Enter the Price per KG.</li>
      <li>Enter the Total KG.</li>
      <li>Enter Grams to see price.</li>
    </ol>
  </div>

  <input type="number" id="pricePerKg" placeholder="Price per KG" oninput="calculate()">
  <input type="number" id="qtyKg" placeholder="Total KG" oninput="calculate()">
  <input type="number" id="qtyGram" placeholder="Grams" oninput="calculate()">

  <div class="result-box">
    <div>Price for KGs: <span class="val" id="resKg">0</span></div>
    <div>Price for Grams: <span class="val" id="resGram">0</span></div>
    <div>Price per 1 Gram: <span class="val" id="resOneGram">0</span></div>
  </div>
</div>

<script>
  // সব টেক্সটকে স্প্যানে রূপান্তর করা
  const container = document.getElementById('instructionList');
  
  function wrapChars(element) {
    element.childNodes.forEach(node => {
      if (node.nodeType === 3) { // যদি টেক্সট নোড হয়
        const text = node.nodeValue;
        const spanContainer = document.createElement('span');
        text.split('').forEach(char => {
          const span = document.createElement('span');
          span.innerText = char;
          span.className = 'scatter-text';
          spanContainer.appendChild(span);
        });
        node.replaceWith(spanContainer);
      } else {
        wrapChars(node);
      }
    });
  }

  wrapChars(container);

  const letters = document.querySelectorAll('.scatter-text');

  // মাউস নিলে ছড়িয়ে পড়বে
  container.addEventListener('mouseover', () => {
    letters.forEach(letter => {
      const x = (Math.random() - 0.5) * 1000; // পুরো পেজ জুড়ে ছড়িয়ে যাবে
      const y = (Math.random() - 0.5) * 1000;
      letter.style.position = 'fixed';
      letter.style.transform = `translate(${x}px, ${y}px) rotate(${Math.random() * 720}deg)`;
      letter.style.zIndex = '9999';
    });
  });

  // মাউস সরালে ফিরে আসবে
  container.addEventListener('mouseout', () => {
    letters.forEach(letter => {
      letter.style.position = 'static';
      letter.style.transform = `translate(0, 0) rotate(0deg)`;
    });
  });

  function calculate() {
    const p = parseFloat(document.getElementById('pricePerKg').value) || 0;
    const k = parseFloat(document.getElementById('qtyKg').value) || 0;
    const g = parseFloat(document.getElementById('qtyGram').value) || 0;
    document.getElementById('resKg').innerHTML = (p * k).toFixed(2);
    document.getElementById('resGram').innerHTML = ((p / 1000) * g).toFixed(2);
    document.getElementById('resOneGram').innerHTML = (p / 1000).toFixed(2);
  }
</script>

</body>
</html>
